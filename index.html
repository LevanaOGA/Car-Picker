<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="hud">
        <div>
          <p class="label">Score</p>
          <p id="score" class="value">0</p>
        </div>
        <div>
          <p class="label">Best</p>
          <p id="best-score" class="value">0</p>
        </div>
      </div>

      <div class="status-row">
        <p id="status" class="status">Press any arrow key or WASD to start.</p>
        <div class="actions">
          <button id="pause-button" class="button" type="button">Pause</button>
          <button id="restart-button" class="button" type="button">Restart</button>
        </div>
      </div>

      <div class="board-wrap">
        <canvas
          id="game-board"
          width="420"
          height="420"
          aria-label="Snake game board"
          role="img"
        ></canvas>
      </div>

      <div class="controls">
        <button class="control-button" type="button" data-direction="up" aria-label="Move up">Up</button>
        <div class="controls-row">
          <button class="control-button" type="button" data-direction="left" aria-label="Move left">Left</button>
          <button class="control-button" type="button" data-direction="down" aria-label="Move down">Down</button>
          <button class="control-button" type="button" data-direction="right" aria-label="Move right">Right</button>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
